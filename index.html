  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','system-ui',sans-serif;overflow-x:hidden;background:#0F0F13;
      -webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;

    #native-splash{position:fixed;inset:0;background:#0F0F13;
      display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;
      transition:opacity 0.5s ease}
    #native-splash.hidden{opacity:0;pointer-events:none}
    .nsLogo{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#EF4444,#10B981,#6366F1);
      display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;font-weight:500;
      font-family:'JetBrains Mono',monospace;box-shadow:0 12px 40px rgba(78,205,196,0.2);margin-bottom:20px}
    .nsTitle{font-size:28px;font-weight:500;font-family:'Inter',sans-serif;
      background:linear-gradient(90deg,#EF4444,#10B981,#6366F1);-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;margin-bottom:6px}
    .nsSub{color:#64748B;font-size:13px;font-weight:400}
    .nsBar{width:140px;height:3px;background:#1A2332;border-radius:3px;margin-top:24px;overflow:hidden}
    .nsProgress{height:100%;background:linear-gradient(90deg,#10B981,#6366F1);border-radius:3px;
      animation:nsLoad 1.8s ease-in-out forwards}
    @keyframes nsLoad{0%{width:0}50%{width:70%}100%{width:100%}}
    @media(prefers-reduced-motion:reduce){.nsProgress{animation:none;width:100%}}
    /* Update banner */
    #sw-update-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:10000;background:#111827;
      border-bottom:1px solid rgba(78,205,196,0.3);padding:12px 20px;text-align:center;
      font-family:'Inter',sans-serif;font-size:13px;color:#F1F5F9;animation:slideDown 0.3s ease}
    @keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
    #sw-update-banner button{margin-left:12px;padding:6px 16px;border-radius:8px;background:#10B981;border:none;
      color:#0F0F13;font-weight:500;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
  </style>
</head>
<body>
  <!-- Update banner (shown when new SW waiting) -->
  <div id="sw-update-banner">

    <button id="sw-update-btn">Update now</button>
    <button id="sw-update-later" style="margin-left:6px;padding:6px 12px;border-radius:8px;background:transparent;border:1px solid #475569;color:#94A3B8;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif">Later</button>
    <button id="sw-update-confirm" style="display:none;margin-left:12px;padding:6px 16px;border-radius:8px;background:#10B981;border:none;color:#0F0F13;font-weight:500;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif">Reload now</button>
    <button id="sw-update-cancel" style="display:none;margin-left:6px;padding:6px 12px;border-radius:8px;background:transparent;border:1px solid #475569;color:#94A3B8;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif">Cancel</button>
  </div>
